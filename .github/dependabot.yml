version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
        patterns: ['*']
        # Avoid one PR bumping eslint 10, jest 30, typescript 6, etc. together.
        update-types:
          - minor
          - patch
    ignore:
      # Majors need explicit ecosystem upgrades (eslint-config-next, plugins, etc.).
      - dependency-name: eslint
        update-types: [version-update:semver-major]
      - dependency-name: '@eslint/*'
        update-types: [version-update:semver-major]
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      - dependency-name: jest
        update-types: [version-update:semver-major]
      - dependency-name: '@types/jest'
        update-types: [version-update:semver-major]
      - dependency-name: '@types/node'
        update-types: [version-update:semver-major]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
