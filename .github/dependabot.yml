version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # No dev-dependency groups: bundled PRs often break `npm ci` (peer majors) or
    # desync the lockfile from Linux CI. Dependabot opens one PR per package instead.
    ignore:
      # Majors need explicit ecosystem upgrades (eslint-config-next, plugins, etc.).
      - dependency-name: eslint
        update-types: [version-update:semver-major]
      - dependency-name: '@eslint/*'
        update-types: [version-update:semver-major]
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      - dependency-name: jest
        update-types: [version-update:semver-major]
      - dependency-name: '@types/jest'
        update-types: [version-update:semver-major]
      - dependency-name: '@types/node'
        update-types: [version-update:semver-major]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
