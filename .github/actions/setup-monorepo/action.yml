name: Setup monorepo
description: Node.js, npm ci, Prisma client generate

inputs:
  node-version:
    description: Node.js version
    required: false
    default: '22'
  skip-prisma:
    description: Skip prisma generate (lint-only jobs)
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: package-lock.json

    # package-lock.json is generated with npm 11 (packageManager: npm@11.6.2).
    # actions/setup-node ships npm 10 first on PATH; corepack --activate alone
    # often leaves `npm -v` at 10.x, and then `npm ci` fails with missing lock entries
    # (@emnapi/*, chokidar@4). Force npm 11 onto PATH and assert before install.
    - name: Use npm from packageManager
      shell: bash
      run: |
        set -euo pipefail
        corepack enable
        corepack prepare npm@11.6.2 --activate
        npm install -g npm@11.6.2
        hash -r
        node -v
        npm -v
        case "$(npm -v)" in
          11.*) ;;
          *)
            echo "::error::Expected npm 11.x (packageManager), got $(npm -v)"
            exit 1
            ;;
        esac

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Generate Prisma client
      if: inputs.skip-prisma != 'true'
      shell: bash
      run: npm run prisma:generate
