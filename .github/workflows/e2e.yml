# Browser E2E — heavier than unit/integration; not required on every PR.
# Runs after green CI on main, weekly schedule, or manual dispatch.

name: E2E

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_ENV: test
  JWT_SECRET: e2e-jwt-secret-minimum-thirty-two-chars-long
  DATABASE_URL: postgresql://soenglish:soenglish@localhost:5432/soenglish?schema=public
  PLAYWRIGHT_TEST_EMAIL: jest-student@arvilio.test
  PLAYWRIGHT_TEST_PASSWORD: TestPass123!
  PLAYWRIGHT_TEACHER_EMAIL: jest-teacher@arvilio.test
  PLAYWRIGHT_TEACHER_PASSWORD: TestPass123!
  WEB_ORIGIN: http://localhost:4200
  API_PROXY_TARGET: http://127.0.0.1:3000
  NEXT_PUBLIC_API_URL: /api
  NEXT_PUBLIC_SOCKET_URL: http://localhost:3000

jobs:
  playwright:
    name: Playwright
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: soenglish
          POSTGRES_PASSWORD: soenglish
          POSTGRES_DB: soenglish
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U soenglish -d soenglish"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Resolve commit SHA
        id: rev
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.rev.outputs.sha }}

      - uses: ./.github/actions/setup-monorepo
      - run: npm run build:email-templates
      - run: npm run prisma:migrate:deploy
      - run: npm run seed:test-users
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 7
