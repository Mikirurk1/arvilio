# Publish production container images to GitHub Container Registry (GHCR).
# After green CI on main (workflow_run), or on version tags / manual dispatch.
# Deployment secrets: GitHub Environments — see docs/reference/ci-cd.md

name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]
  push:
    tags: ['v*.*.*', 'v*.*.*-*']
  workflow_dispatch:
    inputs:
      deploy:
        description: Run deploy step after image push (requires Environment secrets)
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  actions: read

concurrency:
  group: cd-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & push images
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: infra/docker/api.prod.Dockerfile
            image: api
          - service: campus
            dockerfile: infra/docker/campus.prod.Dockerfile
            image: campus
    steps:
      - name: Resolve commit SHA
        id: rev
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.rev.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.rev.outputs.branch }},enable=${{ github.event_name == 'workflow_run' || github.event_name == 'workflow_dispatch' }}
            type=ref,event=tag
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && (steps.rev.outputs.branch == 'main' || steps.rev.outputs.branch == 'master')) }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api

  deploy-staging:
    name: Deploy (staging)
    needs: build-push
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Deploy placeholder
        env:
          API_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/api:sha-${{ github.sha }}
          CAMPUS_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/campus:sha-${{ github.sha }}
        run: |
          echo "Configure GitHub Environment 'staging' with deploy secrets (see docs/reference/ci-cd.md)."
          echo "API_IMAGE=$API_IMAGE"
          echo "CAMPUS_IMAGE=$CAMPUS_IMAGE"
          echo "Example: SSH to host, docker compose pull && docker compose up -d"

  deploy-production:
    name: Deploy (production)
    needs: build-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Deploy placeholder
        env:
          API_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ github.ref_name }}
          CAMPUS_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/campus:${{ github.ref_name }}
        run: |
          echo "Tag release deploy — wire production secrets in Environment 'production'."
          echo "API_IMAGE=$API_IMAGE"
          echo "CAMPUS_IMAGE=$CAMPUS_IMAGE"
