# LiveKit server configuration for Arvilio
# Used by infra/docker/docker-compose.yml (service: livekit)
#
# IMPORTANT: change the key/secret before deploying to production.
# Format: "apikey: apisecret" (secret must be ≥ 32 characters)
# Must match LIVEKIT_API_KEY / LIVEKIT_API_SECRET (and System → Connections → LiveKit).

port: 7880
rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: true   # auto-detect public IP for STUN/TURN candidates

# API keys — must match app credentials (env or System → Connections → LiveKit)
keys:
  # Local/dev only. Secret ≥ 32 chars (LiveKit rejects shorter secrets).
  devkey: arvilio-local-livekit-dev-secret-do-not-use-in-prod

logging:
  level: info

# Uncomment to add a TURN server relay (needed when UDP is firewalled):
# turn:
#   enabled: true
#   domain: livekit.your-domain.com
#   tls_port: 5349
#   udp_port: 3478
#   external_tls: true
