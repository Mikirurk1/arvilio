name: soenglish

services:
  postgres:
    image: postgres:16-alpine
    container_name: soenglish-postgres
    environment:
      POSTGRES_DB: soenglish
      POSTGRES_USER: soenglish
      POSTGRES_PASSWORD: soenglish
    ports:
      - '5432:5432'
    volumes:
      - soenglish-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U soenglish -d soenglish']
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    profiles:
      - stack
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    container_name: soenglish-api
    env_file:
      - ../../.env
    environment:
      NODE_OPTIONS: --max-old-space-size=4096
      PORT: 3000
      WEB_ORIGIN: http://localhost:4200
      DATABASE_URL: postgresql://soenglish:soenglish@postgres:5432/soenglish?schema=public
      JWT_SECRET: ${JWT_SECRET:-soenglish-docker-dev-jwt-secret-32chars}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    profiles:
      - stack
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    container_name: soenglish-web
    env_file:
      - ../../.env
    environment:
      NODE_OPTIONS: --max-old-space-size=4096
      PORT: 4200
      API_URL: http://api:3000/api
      API_PROXY_TARGET: http://api:3000
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3000
    ports:
      - '4200:4200'
    depends_on:
      - api
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    container_name: soenglish-livekit
    command: --config /etc/livekit/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50200:50000-50200/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate:v1.6.4
    container_name: soenglish-libretranslate
    ports:
      - '5001:5000'
    environment:
      # English + Ukrainian only — faster first start and lower RAM in dev
      LT_LOAD_ONLY: en,uk
    healthcheck:
      test: ['CMD-SHELL', 'python3 -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:5000/languages\")"']
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

volumes:
  soenglish-postgres-data:
